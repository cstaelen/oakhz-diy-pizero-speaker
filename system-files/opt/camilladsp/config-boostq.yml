---
devices:
  samplerate: 48000
  chunksize: 1024
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:1,0"
    format: S16LE

filters:

  # --- PEAK LIMITER ---
  # Soft brick-wall limiter to prevent clipping at high volume
  peak_limiter:
    type: Gain
    parameters:
      gain: -2
      inverted: false

  # --- PREAMP ---
  # Slightly reduced to leave headroom for new boosts
  preamp_gain:
    type: Gain
    parameters:
      gain: 3
      inverted: false

  # --- DRIVER PROTECTION ---
  # High-pass filter to protect 80mm drivers below their physical limit
  hp_protection:
    type: Biquad
    parameters:
      type: Highpass
      freq: 45
      q: 0.7

  # --- SUB SHELF ---
  # Aggressive low shelf to simulate sub-bass depth
  # Pushes the bass reflex vent to its physical limit at ~58Hz
  sub_shelf:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 40
      slope: 6
      gain: 4

  # --- BASS VENT BOOST ---
  # Precise Peaking at bass reflex tuning frequency (58Hz)
  # Wide Q=0.5 for natural, musical bass enhancement
  # This is the key JBL/Bose "punch" technique
  bass_vent_boost:
    type: Biquad
    parameters:
      type: Peaking
      freq: 58
      q: 0.5
      gain: 5

  # --- LOUDNESS BASS ---
  loudness_bass_low:
    type: Biquad
    parameters:
      type: Peaking
      freq: 58
      q: 0.9
      gain: 4

  # Mid-bass punch
  loudness_bass_mid:
    type: Biquad
    parameters:
      type: Peaking
      freq: 100
      q: 1.2
      gain: 3

  # --- ROOM CORRECTION ---
  room_correction:
    type: Biquad
    parameters:
      type: Peaking
      freq: 200
      q: 0.8
      gain: 1

  # --- MIDRANGE CORRECTION ---
  mid_cut_low:
    type: Biquad
    parameters:
      type: Peaking
      freq: 300
      q: 1.0
      gain: -3

  mid_cut_high:
    type: Biquad
    parameters:
      type: Peaking
      freq: 600
      q: 1.0
      gain: -2

  # --- PRESENCE ---
  presence:
    type: Biquad
    parameters:
      type: Peaking
      freq: 3000
      q: 1.5
      gain: 2

  # --- HARMONIC EXCITER ---
  # Additional high shelf at 6kHz for air and brilliance
  # Simulates harmonic exciter effect used in JBL/Bose
  harmonic_exciter:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 6000
      slope: 6
      gain: 3

  # --- LOUDNESS TREBLE ---
  loudness_treble:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 8000
      slope: 6
      gain: 4

  # --- 10-BAND PARAMETRIC EQ ---
  # Calibrated from RTA measurement session
  eq_31:
    type: Biquad
    parameters:
      type: Peaking
      freq: 31
      q: 1.0
      gain: 4

  eq_63:
    type: Biquad
    parameters:
      type: Peaking
      freq: 63
      q: 1.0
      gain: 4

  eq_125:
    type: Biquad
    parameters:
      type: Peaking
      freq: 125
      q: 1.0
      gain: 4

  eq_250:
    type: Biquad
    parameters:
      type: Peaking
      freq: 250
      q: 1.0
      gain: 2.0

  eq_500:
    type: Biquad
    parameters:
      type: Peaking
      freq: 500
      q: 1.0
      gain: -4.0

  eq_1k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 1000
      q: 1.0
      gain: -4.0

  eq_2k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2000
      q: 1.0
      gain: -3.0

  eq_4k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 4000
      q: 1.0
      gain: 4.0

  eq_8k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 8000
      q: 1.0
      gain: 7.0

  eq_16k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 16000
      q: 1.0
      gain: 6.0

mixers:
  # --- STEREO WIDENING ---
  stereo_wide:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
          - channel: 1
            gain: -9
            inverted: true
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false
          - channel: 0
            gain: -9
            inverted: true

pipeline:
  - type: Filter
    channel: 0
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - sub_shelf           # Sub-bass depth simulation
      - bass_vent_boost     # Bass reflex exploitation at 58Hz
      - loudness_bass_low
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter    # Air and brilliance above 6kHz
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  - type: Filter
    channel: 1
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - sub_shelf
      - bass_vent_boost
      - loudness_bass_low
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  - type: Mixer
    name: stereo_wide