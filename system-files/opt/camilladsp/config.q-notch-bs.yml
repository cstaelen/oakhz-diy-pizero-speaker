---
devices:
  samplerate: 48000
  chunksize: 1024
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:1,0"
    format: S16LE

filters:

  # --- PEAK LIMITER ---
  peak_limiter:
    type: Gain
    parameters:
      gain: -2
      inverted: false

  # --- PREAMP ---
  # Reduced to leave headroom for bass boosts
  preamp_gain:
    type: Gain
    parameters:
      gain: 1
      inverted: false

  # --- DRIVER PROTECTION ---
  hp_protection:
    type: Biquad
    parameters:
      type: Highpass
      freq: 45
      q: 0.7

  # --- LINKWITZ TRANSFORM ---
  # DMA80-4: f0=93.5Hz, q0=0.41
  # Target: fp=50Hz, qp=0.5 (more punchy than Butterworth 0.707)
  # qp=0.5 gives tighter, more controlled bass vs 0.707 which is flatter
  linkwitz_transform:
    type: Biquad
    parameters:
      type: LinkwitzTransform
      freq_act: 93.5
      q_act: 0.41
      freq_target: 60.0
      q_target: 0.5

  # --- BASS REFLEX ALLPASS ---
  # Compensates group delay of bass reflex at vent tuning frequency
  # Makes bass "tighter" and less "boomy" — phase coherence at 72Hz
  bass_reflex_allpass:
    type: Biquad
    parameters:
      type: Allpass
      freq: 72
      q: 0.7

  # --- BASS VENT BOOST ---
  # Precise Peaking at bass reflex tuning frequency (58Hz)
  # Reduced vs previous — Linkwitz already handles the extension
  bass_vent_boost:
    type: Biquad
    parameters:
      type: Peaking
      freq: 72
      q: 0.5
      gain: 2

  # --- HP RESONANCE NOTCH ---
  # Cuts the natural resonance of DMA80-4 at Fs=93.5Hz
  # Reduces coloration and "one-note bass" effect in the mid-bass
  hp_resonance_notch:
    type: Biquad
    parameters:
      type: Peaking
      freq: 93.5
      q: 2.0
      gain: -3

  # --- LOUDNESS BASS MID ---
  loudness_bass_mid:
    type: Biquad
    parameters:
      type: Peaking
      freq: 100
      q: 1.2
      gain: 2

  # --- ROOM CORRECTION ---
  room_correction:
    type: Biquad
    parameters:
      type: Peaking
      freq: 200
      q: 0.8
      gain: 1

  # --- MIDRANGE CORRECTION ---
  mid_cut_low:
    type: Biquad
    parameters:
      type: Peaking
      freq: 300
      q: 1.0
      gain: -3

  mid_cut_high:
    type: Biquad
    parameters:
      type: Peaking
      freq: 600
      q: 1.0
      gain: -2

  # --- PRESENCE ---
  presence:
    type: Biquad
    parameters:
      type: Peaking
      freq: 3000
      q: 1.5
      gain: 2

  # --- HARMONIC EXCITER ---
  harmonic_exciter:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 6000
      slope: 6
      gain: 3

  # --- LOUDNESS TREBLE ---
  loudness_treble:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 8000
      slope: 6
      gain: 4

  # --- SPATIAL CROSSOVER ---
  # Left: warm, bass-forward
  spatial_left_bass:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 200
      slope: 6
      gain: 2

  # Right: airy, treble-forward
  spatial_right_treble:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 3000
      slope: 6
      gain: 2

  # --- 10-BAND PARAMETRIC EQ ---
  eq_31:
    type: Biquad
    parameters:
      type: Peaking
      freq: 31
      q: 1.0
      gain: 4

  eq_63:
    type: Biquad
    parameters:
      type: Peaking
      freq: 63
      q: 1.0
      gain: 4

  eq_125:
    type: Biquad
    parameters:
      type: Peaking
      freq: 125
      q: 1.0
      gain: 4

  eq_250:
    type: Biquad
    parameters:
      type: Peaking
      freq: 250
      q: 1.0
      gain: 2.0

  eq_500:
    type: Biquad
    parameters:
      type: Peaking
      freq: 500
      q: 1.0
      gain: -4.0

  eq_1k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 1000
      q: 1.0
      gain: -4.0

  eq_2k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2000
      q: 1.0
      gain: -3.0

  eq_4k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 4000
      q: 1.0
      gain: 4.0

  eq_8k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 8000
      q: 1.0
      gain: 7.0

  eq_16k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 16000
      q: 1.0
      gain: 6.0

mixers:
  # --- STEREO WIDENING ---
  stereo_wide:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
          - channel: 1
            gain: -9
            inverted: true
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false
          - channel: 0
            gain: -9
            inverted: true

pipeline:
  # LEFT channel — warm, bass-forward
  - type: Filter
    channel: 0
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform      # Bass redesign: 93.5Hz → 50Hz punchy
      - bass_reflex_allpass     # Phase coherence at 72Hz
      - bass_vent_boost         # Vent boost at 72Hz
      - hp_resonance_notch      # Cut HP resonance at 93.5Hz
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - spatial_left_bass       # Spatial: warm left
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  # RIGHT channel — airy, treble-forward
  - type: Filter
    channel: 1
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform
      - bass_reflex_allpass
      - bass_vent_boost
      - hp_resonance_notch
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - spatial_right_treble    # Spatial: airy right
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  - type: Mixer
    name: stereo_wide