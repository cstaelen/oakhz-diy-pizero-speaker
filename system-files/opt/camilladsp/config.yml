# =============================================================================
# OaKhz Audio — CamillaDSP Configuration
# Hardware: 2× DMA80-4 (Fs=93.5Hz, Qts=0.41, Xmax=2.5mm) + HiFiBerry MiniAmp
# Enclosure: bass reflex, port 32mm × 60mm → accord ~60-63Hz
# =============================================================================
#
# PIPELINE OVERVIEW
# -----------------
# Bluetooth → PulseAudio → ALSA Loopback → CamillaDSP → HiFiBerry DAC → Speakers
#
# 1. MONO SUM
#    L+R summed at -6dB each → both drivers reproduce identical signal.
#    +3dB effective SPL from double cone surface, no phase issues, correct 4Ω load.
#
# 2. MAIN EQ CHAIN (channels 0 & 1)
#    - peak_limiter (-4dB): global headroom before bass boosts
#    - hp_protection (highpass 50Hz): protect driver below port frequency
#    - preamp_gain (+1dB): global level trim
#    - linkwitz_transform (93.5Hz→60Hz): mathematically extends bass response
#    - bass_vent_boost (59Hz Q=1.5 +2dB): narrow boost at port resonance
#    - bass_allpass (63Hz Q=0.7): [OPTION A] phase correction at port freq,
#      tightens bass transients without adding gain
#    - hp_resonance_notch (93.5Hz -2dB): reduces "one-note bass" coloration
#    - loudness_bass_mid (80Hz +4dB): [OPTION B] punch boost in the zone where
#      port + cone work together — more punch, less excursion than boosting 63Hz
#    - room_correction, mid_cut_low/high, presence, exciter, treble: tonal shaping
#    - 10-band parametric EQ (31Hz–16kHz): user-adjustable via web UI
#
# 3. MULTIBAND PROCESSING [OPTIONS C + D]
#    Split 2ch → 4ch (bass L, high L, bass R, high R)
#    - Bass band (<200Hz, Linkwitz-Riley LR4):
#        crossover_low + bass_harmonic (soft clip -6dB)
#        The soft clipper generates 2nd/3rd harmonics (120Hz, 180Hz...) of the
#        bass fundamentals → psychoacoustic depth without extra excursion.
#    - High band (>200Hz, Linkwitz-Riley LR4): unprocessed crossover
#    Recombine 4ch → 2ch (flat summing response from LR4 crossover)
#
# 4. OUTPUT LIMITER
#    Final soft clip at -0.5dBFS: catches any remaining digital peaks.
#
# =============================================================================

---
devices:
  samplerate: 48000
  chunksize: 1024
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:1,0"
    format: S16LE

filters:

  # --- HEADROOM ---
  peak_limiter:
    type: Gain
    parameters:
      gain: -2
      inverted: false

  # --- PREAMP ---
  preamp_gain:
    type: Gain
    parameters:
      gain: 1
      inverted: false

  # --- DRIVER PROTECTION ---
  hp_protection:
    type: Biquad
    parameters:
      type: Highpass
      freq: 50
      q: 0.7

  # --- LINKWITZ TRANSFORM ---
  # DMA80-4: freq_act=93.5Hz, q_act=0.41 → target 60Hz/Q=0.5
  linkwitz_transform:
    type: Biquad
    parameters:
      type: LinkwitzTransform
      freq_act: 93.5
      q_act: 0.41
      freq_target: 60.0
      q_target: 0.5

  # --- BASS VENT BOOST ---
  # Narrow boost at port frequency (59Hz), Q=1.5 to avoid spilling into excursion zone
  bass_vent_boost:
    type: Biquad
    parameters:
      type: Peaking
      freq: 59
      q: 1.5
      gain: 2

  # --- OPTION A: ALLPASS PHASE CORRECTION ---
  # Corrects group delay at bass reflex port frequency.
  # Tightens bass transients without adding gain — bass sounds more defined.
  bass_allpass:
    type: Biquad
    parameters:
      type: Allpass
      freq: 63
      q: 0.7

  # --- HP RESONANCE NOTCH ---
  # Option B: reduced to -2dB (was -3dB) to restore some natural driver punch
  hp_resonance_notch:
    type: Biquad
    parameters:
      type: Peaking
      freq: 93.5
      q: 2.0
      gain: -2

  # --- OPTION B: PUNCH ZONE BOOST ---
  # Moved from 100Hz to 80Hz: the zone where port + cone work together.
  # More punch, less excursion risk than boosting at 59-63Hz.
  loudness_bass_mid:
    type: Biquad
    parameters:
      type: Peaking
      freq: 80
      q: 1.2
      gain: 4

  # --- ROOM CORRECTION ---
  room_correction:
    type: Biquad
    parameters:
      type: Peaking
      freq: 200
      q: 0.8
      gain: 1

  # --- MIDRANGE CORRECTION ---
  mid_cut_low:
    type: Biquad
    parameters:
      type: Peaking
      freq: 300
      q: 1.0
      gain: -3

  mid_cut_high:
    type: Biquad
    parameters:
      type: Peaking
      freq: 600
      q: 1.0
      gain: -2

  # --- PRESENCE ---
  presence:
    type: Biquad
    parameters:
      type: Peaking
      freq: 3000
      q: 1.5
      gain: 3

  # --- HARMONIC EXCITER ---
  harmonic_exciter:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 6000
      slope: 6
      gain: 1

  # --- LOUDNESS TREBLE ---
  loudness_treble:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 8000
      slope: 6
      gain: 2

  # --- 10-BAND PARAMETRIC EQ ---
  eq_31:
    type: Biquad
    parameters:
      type: Peaking
      freq: 31
      q: 1.0
      gain: 0

  eq_63:
    type: Biquad
    parameters:
      type: Peaking
      freq: 63
      q: 1.0
      gain: 0

  eq_125:
    type: Biquad
    parameters:
      type: Peaking
      freq: 125
      q: 1.0
      gain: 2

  eq_250:
    type: Biquad
    parameters:
      type: Peaking
      freq: 250
      q: 1.0
      gain: 2.0

  eq_500:
    type: Biquad
    parameters:
      type: Peaking
      freq: 500
      q: 1.0
      gain: -4.0

  eq_1k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 1000
      q: 1.0
      gain: -4.0

  eq_2k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2000
      q: 1.0
      gain: -3.0

  eq_4k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 4000
      q: 1.0
      gain: 5.0

  eq_8k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 8000
      q: 1.0
      gain: 4.0

  eq_16k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 16000
      q: 1.0
      gain: 3.0

  # --- OPTION C: MULTIBAND CROSSOVER ---
  # Linkwitz-Riley 4th order at 200Hz: flat summing response when recombined.
  # Bass band processed separately with its own limiter.
  crossover_low:
    type: BiquadCombo
    parameters:
      type: LinkwitzRileyLowpass
      freq: 200
      order: 4

  crossover_high:
    type: BiquadCombo
    parameters:
      type: LinkwitzRileyHighpass
      freq: 200
      order: 4

  # --- OPTION D: BASS HARMONIC EXCITER ---
  # Soft clipper on bass band only (post crossover_low).
  # Generates 2nd/3rd harmonics (120Hz, 180Hz...) from bass fundamentals.
  # The ear reconstructs the perceived low-frequency fundamental from these harmonics.
  # clip_limit=-6dB: moderate saturation, musical not harsh.
  bass_harmonic:
    type: Limiter
    parameters:
      clip_limit: -6.0
      soft_clip: true

  # --- OUTPUT SAFETY LIMITER ---
  # Final peak catcher after multiband recombine.
  output_limiter:
    type: Limiter
    parameters:
      clip_limit: -0.5
      soft_clip: true

mixers:
  # --- MONO SUM ---
  mono_sum:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: -6
            inverted: false
          - channel: 1
            gain: -6
            inverted: false
      - dest: 1
        sources:
          - channel: 0
            gain: -6
            inverted: false
          - channel: 1
            gain: -6
            inverted: false

  # --- SPLIT FOR MULTIBAND (2→4) ---
  # Duplicate each channel: ch0/ch1 from L, ch2/ch3 from R
  split_multiband:
    channels:
      in: 2
      out: 4
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 1
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 2
        sources:
          - channel: 1
            gain: 0
            inverted: false
      - dest: 3
        sources:
          - channel: 1
            gain: 0
            inverted: false

  # --- COMBINE MULTIBAND (4→2) ---
  # Sum bass (ch0) + high (ch1) → L output
  # Sum bass (ch2) + high (ch3) → R output
  combine_multiband:
    channels:
      in: 4
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
          - channel: 1
            gain: 0
            inverted: false
      - dest: 1
        sources:
          - channel: 2
            gain: 0
            inverted: false
          - channel: 3
            gain: 0
            inverted: false

pipeline:
  # Sum L+R to mono
  - type: Mixer
    name: mono_sum

  # Main EQ chain — channel 0
  - type: Filter
    channel: 0
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform
      - bass_vent_boost
      - bass_allpass
      - hp_resonance_notch
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  # Main EQ chain — channel 1
  - type: Filter
    channel: 1
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform
      - bass_vent_boost
      - bass_allpass
      - hp_resonance_notch
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  # Split to 4ch for multiband processing
  - type: Mixer
    name: split_multiband

  # ch0: bass L — crossover lowpass + harmonic exciter (Options C+D)
  - type: Filter
    channel: 0
    names:
      - crossover_low
      - bass_harmonic

  # ch1: high L — crossover highpass (Option C)
  - type: Filter
    channel: 1
    names:
      - crossover_high

  # ch2: bass R — crossover lowpass + harmonic exciter (Options C+D)
  - type: Filter
    channel: 2
    names:
      - crossover_low
      - bass_harmonic

  # ch3: high R — crossover highpass (Option C)
  - type: Filter
    channel: 3
    names:
      - crossover_high

  # Recombine bass + high → 2ch output
  - type: Mixer
    name: combine_multiband

  # Final safety limiter
  - type: Filter
    channel: 0
    names:
      - output_limiter

  - type: Filter
    channel: 1
    names:
      - output_limiter
