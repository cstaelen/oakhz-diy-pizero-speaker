---
devices:
  samplerate: 48000
  chunksize: 1024
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:1,0"
    format: S16LE

filters:

  # --- HEADROOM ---
  # -6dB to guarantee bass transients NEVER clip digitally.
  # Digital clipping = harsh sound. Clean headroom = the "Bose" cleanliness.
  # Compensate by turning up the physical/Bluetooth volume.
  peak_limiter:
    type: Gain
    parameters:
      gain: -6
      inverted: false

  # --- PREAMP ---
  preamp_gain:
    type: Gain
    parameters:
      gain: 2
      inverted: false

  # --- DRIVER PROTECTION ---
  # Raised to 50Hz: frees cone excursion (Xmax 2.5mm) for the 60-120Hz
  # zone where the music actually lives. Below 50Hz nothing usable exists
  # (vent tuned at 63Hz).
  hp_protection:
    type: Biquad
    parameters:
      type: Highpass
      freq: 50
      q: 0.7

  # --- LINKWITZ TRANSFORM ---
  # DMA80-4: freq_act=93.5Hz, q_act=0.41
  # Target 60Hz: just below the vent tuning (63Hz), extends response
  # without demanding excursion the driver can't deliver.
  linkwitz_transform:
    type: Biquad
    parameters:
      type: LinkwitzTransform
      freq_act: 93.5
      q_act: 0.41
      freq_target: 60.0
      q_target: 0.5

  # --- BASS VENT BOOST ---
  # THE main bass boost — centered on the measured vent frequency (63Hz,
  # re-measured after rear panel gasket installation).
  # Single consolidated boost instead of stacking multiple overlapping ones.
  bass_vent_boost:
    type: Biquad
    parameters:
      type: Peaking
      freq: 63
      q: 0.6
      gain: 4

  # --- HP RESONANCE NOTCH ---
  # Cuts the DMA80-4 natural resonance (Fs=93.5Hz).
  # Kills the "one-note bass" coloration — key for clean, defined bass.
  hp_resonance_notch:
    type: Biquad
    parameters:
      type: Peaking
      freq: 93.5
      q: 2.0
      gain: -3

  # --- LOUDNESS BASS MID ---
  # Reduced to +2: bass_vent_boost now does the heavy lifting.
  loudness_bass_mid:
    type: Biquad
    parameters:
      type: Peaking
      freq: 100
      q: 1.2
      gain: 2

  # --- ROOM CORRECTION ---
  room_correction:
    type: Biquad
    parameters:
      type: Peaking
      freq: 200
      q: 0.8
      gain: 1

  # --- MIDRANGE CORRECTION ---
  mid_cut_low:
    type: Biquad
    parameters:
      type: Peaking
      freq: 300
      q: 1.0
      gain: -3

  mid_cut_high:
    type: Biquad
    parameters:
      type: Peaking
      freq: 600
      q: 1.0
      gain: -1

  # --- PRESENCE ---
  presence:
    type: Biquad
    parameters:
      type: Peaking
      freq: 3000
      q: 1.5
      gain: 3

  # --- HARMONIC EXCITER ---
  harmonic_exciter:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 6000
      slope: 6
      gain: 1

  # --- LOUDNESS TREBLE ---
  loudness_treble:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 8000
      slope: 6
      gain: 2

  # --- WIDENING HIGHPASS ---
  # Crucial fix: the stereo widening cross-feed is now filtered above 400Hz.
  # Bass content (mostly mono) is NO LONGER phase-cancelled by the widener.
  # This restores full, round, mono-coherent bass — the Bose/JBL way.
  widen_highpass:
    type: Biquad
    parameters:
      type: Highpass
      freq: 400
      q: 0.7

  # --- 10-BAND PARAMETRIC EQ ---
  # eq_31 set to 0: nothing usable below 50Hz on this system,
  # boosting it only wasted headroom and excursion.
  eq_31:
    type: Biquad
    parameters:
      type: Peaking
      freq: 31
      q: 1.0
      gain: 0

  eq_63:
    type: Biquad
    parameters:
      type: Peaking
      freq: 63
      q: 1.0
      gain: 0

  eq_125:
    type: Biquad
    parameters:
      type: Peaking
      freq: 125
      q: 1.0
      gain: 2

  eq_250:
    type: Biquad
    parameters:
      type: Peaking
      freq: 250
      q: 1.0
      gain: 2.0

  eq_500:
    type: Biquad
    parameters:
      type: Peaking
      freq: 500
      q: 1.0
      gain: -4.0

  eq_1k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 1000
      q: 1.0
      gain: -4.0

  eq_2k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2000
      q: 1.0
      gain: -3.0

  eq_4k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 4000
      q: 1.0
      gain: 2.0

  eq_8k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 8000
      q: 1.0
      gain: 4.0

  eq_16k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 16000
      q: 1.0
      gain: 3.0

mixers:
  # --- SPLIT 2 → 4 ---
  # Channels 0/1: main L/R signal (full band)
  # Channels 2/3: copies of L/R that will be highpass-filtered,
  # then cross-fed inverted for widening (treble only)
  split_for_widening:
    channels:
      in: 2
      out: 4
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false
      - dest: 2
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 3
        sources:
          - channel: 1
            gain: 0
            inverted: false

  # --- COMBINE 4 → 2 ---
  # Widening applied ONLY on the filtered (>400Hz) copies.
  # Bass stays mono-coherent and full.
  widen_and_combine:
    channels:
      in: 4
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
          - channel: 3
            gain: -9
            inverted: true
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false
          - channel: 2
            gain: -9
            inverted: true

pipeline:
  # Main EQ chain — identical for both channels
  - type: Filter
    channel: 0
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform
      - bass_vent_boost
      - hp_resonance_notch
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  - type: Filter
    channel: 1
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform
      - bass_vent_boost
      - hp_resonance_notch
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k

  # Split into 4 channels for band-limited widening
  - type: Mixer
    name: split_for_widening

  # Highpass the widening copies — bass never reaches the cross-feed
  - type: Filter
    channel: 2
    names:
      - widen_highpass

  - type: Filter
    channel: 3
    names:
      - widen_highpass

  # Recombine: full-band main + treble-only inverted cross-feed
  - type: Mixer
    name: widen_and_combine