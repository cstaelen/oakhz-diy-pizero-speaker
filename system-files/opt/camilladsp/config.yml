---
devices:
  samplerate: 48000
  chunksize: 1024
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:1,0"
    format: S16LE

filters:

  # --- HEADROOM ---
  peak_limiter:
    type: Gain
    parameters:
      gain: -4
      inverted: false

  # --- PREAMP ---
  preamp_gain:
    type: Gain
    parameters:
      gain: 1
      inverted: false

  # --- DRIVER PROTECTION ---
  hp_protection:
    type: Biquad
    parameters:
      type: Highpass
      freq: 50
      q: 0.7

  # --- LINKWITZ TRANSFORM ---
  linkwitz_transform:
    type: Biquad
    parameters:
      type: LinkwitzTransform
      freq_act: 93.5
      q_act: 0.41
      freq_target: 60.0
      q_target: 0.5

  # --- BASS VENT BOOST ---
  bass_vent_boost:
    type: Biquad
    parameters:
      type: Peaking
      freq: 59
      q: 1.5
      gain: 2

  # --- HP RESONANCE NOTCH ---
  hp_resonance_notch:
    type: Biquad
    parameters:
      type: Peaking
      freq: 93.5
      q: 2.0
      gain: -3

  # --- LOUDNESS BASS MID ---
  loudness_bass_mid:
    type: Biquad
    parameters:
      type: Peaking
      freq: 100
      q: 1.2
      gain: 4

  # --- ROOM CORRECTION ---
  room_correction:
    type: Biquad
    parameters:
      type: Peaking
      freq: 200
      q: 0.8
      gain: 1

  # --- MIDRANGE CORRECTION ---
  mid_cut_low:
    type: Biquad
    parameters:
      type: Peaking
      freq: 300
      q: 1.0
      gain: -3

  mid_cut_high:
    type: Biquad
    parameters:
      type: Peaking
      freq: 600
      q: 1.0
      gain: -2

  # --- PRESENCE ---
  presence:
    type: Biquad
    parameters:
      type: Peaking
      freq: 3000
      q: 1.5
      gain: 3

  # --- HARMONIC EXCITER ---
  harmonic_exciter:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 6000
      slope: 6
      gain: 1

  # --- LOUDNESS TREBLE ---
  loudness_treble:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 8000
      slope: 6
      gain: 2

  # --- 10-BAND PARAMETRIC EQ ---
  eq_31:
    type: Biquad
    parameters:
      type: Peaking
      freq: 31
      q: 1.0
      gain: 0

  eq_63:
    type: Biquad
    parameters:
      type: Peaking
      freq: 63
      q: 1.0
      gain: 0

  eq_125:
    type: Biquad
    parameters:
      type: Peaking
      freq: 125
      q: 1.0
      gain: 2

  eq_250:
    type: Biquad
    parameters:
      type: Peaking
      freq: 250
      q: 1.0
      gain: 2.0

  eq_500:
    type: Biquad
    parameters:
      type: Peaking
      freq: 500
      q: 1.0
      gain: -4.0

  eq_1k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 1000
      q: 1.0
      gain: -4.0

  eq_2k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2000
      q: 1.0
      gain: -3.0

  eq_4k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 4000
      q: 1.0
      gain: 5.0

  eq_8k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 8000
      q: 1.0
      gain: 4.0

  eq_16k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 16000
      q: 1.0
      gain: 3.0

  # --- OUTPUT LIMITER ---
  output_limiter:
    type: Limiter
    parameters:
      clip_limit: -0.5
      soft_clip: true

mixers:
  # --- MONO SUM ---
  mono_sum:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: -6
            inverted: false
          - channel: 1
            gain: -6
            inverted: false
      - dest: 1
        sources:
          - channel: 0
            gain: -6
            inverted: false
          - channel: 1
            gain: -6
            inverted: false

pipeline:
  - type: Mixer
    name: mono_sum

  - type: Filter
    channel: 0
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform
      - bass_vent_boost
      - hp_resonance_notch
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k
      - output_limiter

  - type: Filter
    channel: 1
    names:
      - peak_limiter
      - hp_protection
      - preamp_gain
      - linkwitz_transform
      - bass_vent_boost
      - hp_resonance_notch
      - loudness_bass_mid
      - room_correction
      - mid_cut_low
      - mid_cut_high
      - presence
      - harmonic_exciter
      - loudness_treble
      - eq_31
      - eq_63
      - eq_125
      - eq_250
      - eq_500
      - eq_1k
      - eq_2k
      - eq_4k
      - eq_8k
      - eq_16k
      - output_limiter
